name: build
on:
  workflow_call:
    inputs:
      version:
        description: 'Emacs version (e.g. 30.1)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Emacs version (e.g. 30.1)'
        type: string
        required: true
permissions:
  contents: write
jobs:
  draft:
    runs-on: ubuntu-slim
    steps:
      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "emacs-$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --title "Emacs v$VERSION" \
          --notes "Built from https://ftp.gnu.org/gnu/emacs/emacs-$VERSION.tar.xz" \
          --draft
  build:
    needs: draft
    strategy:
      fail-fast: true
      matrix:
        variant: [nox, pgtk]
        include:
          - arch: amd64
            runner: ubuntu-24.04
            march: x86-64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install common build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 libgccjit-14-dev \
            make autoconf pkg-config texinfo \
            libgnutls28-dev libjansson-dev libtree-sitter-dev \
            libncurses-dev zlib1g-dev \
            zstd
      - name: Install pgtk-only deps
        if: matrix.variant == 'pgtk'
        run: |
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libcairo2-dev libharfbuzz-dev librsvg2-dev libasound2-dev \
            libpng-dev libjpeg-dev libgif-dev libtiff-dev libwebp-dev
      - name: Build Emacs (${{ matrix.variant }})
        run: |
          bash scripts/build-emacs.sh \
            "${{ inputs.version }}" \
            "${{ matrix.variant }}" \
            "${{ matrix.march }}"
      - name: Package
        run: |
          bash scripts/package.sh \
            "${{ inputs.version }}" \
            linux \
            "${{ matrix.arch }}" \
            "${{ matrix.variant }}"
      - name: Upload to Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release upload "v$VERSION" \
          ./emacs-${{ inputs.version }}-linux-${{ matrix.arch }}-${{ matrix.variant }}.tar.zst
  release:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release edit "emacs-$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --draft=false
