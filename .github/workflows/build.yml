name: build
on:
  workflow_call:
    inputs:
      version:
        description: 'Emacs version (e.g. 30.1)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Emacs version (e.g. 30.1)'
        type: string
        required: true
permissions:
  contents: write
jobs:
  draft:
    runs-on: ubuntu-slim
    steps:
      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "emacs-$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --title "Emacs v$VERSION" \
          --notes "Built from https://ftp.gnu.org/gnu/emacs/emacs-$VERSION.tar.xz" \
          --draft
  build:
    needs: draft
    strategy:
      fail-fast: true
      matrix:
        include:
          - distro: ubuntu
            runner: ubuntu-24.04
            arch: amd64
            march: x86-64
          - distro: debian
            runner: ubuntu-24.04
            container: docker.io/library/debian:bookworm
            arch: amd64
            march: x86-64
          - distro: fedora-43
            runner: ubuntu-24.04
            container: quay.io/fedora/fedora:43
            arch: amd64
            march: x86-64
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || fromJSON('null') }}
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: bash scripts/build/install-deps.sh
      - name: Build Emacs
        run: |
          bash scripts/build/build-emacs.sh \
            "${{ inputs.version }}" \
            "${{ matrix.march }}"
      - name: Package
        run: |
          bash scripts/build/package.sh \
            "${{ inputs.version }}" \
            "${{ matrix.distro }}" \
            "${{ matrix.arch }}" \
            pgtk
      - name: Make native package
        run: |
          bash scripts/build/make-native-package.sh \
            "${{ inputs.version }}" \
            "${{ matrix.distro }}" \
            "${{ matrix.arch }}"
      - name: Upload to Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/build/upload-release.sh \
            "${{ inputs.version }}" \
            "${{ matrix.distro }}" \
            "${{ matrix.arch }}" \
            pgtk
      - name: Upload native package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/build/upload-native-package.sh \
            "${{ inputs.version }}" \
            "${{ matrix.distro }}" \
            "${{ matrix.arch }}"
  release:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release edit "emacs-$VERSION" \
          --repo "$GITHUB_REPOSITORY" \
          --draft=false
