name: check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if this version is already released'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.r.outputs.version }}
      should_build: ${{ steps.r.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6

      - id: r
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          version=$(bash scripts/latest-upstream.sh)
          echo "Upstream latest: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "${FORCE:-false}" == "true" ]]; then
            echo "force=true; building regardless"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "v$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release v$version already exists; skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "no release for v$version yet; will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
    permissions:
      contents: write
